<!-- 사이트 전역 Pretendard 웹폰트 (대시보드와 폰트 통일) -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">

<!-- 파비콘: 식자재쿡 앱 아이콘 -->
<link rel="icon" type="image/png" href="{{ '/assets/images/foodcook-icon.png' | relative_url }}">
<link rel="apple-touch-icon" href="{{ '/assets/images/foodcook-icon.png' | relative_url }}">

<!-- ── 사이드바 프로필 카드 (좌측 타이틀과 메뉴 사이) ─────────────────
     just-the-docs 원격 테마는 버전이 고정돼 있지 않아 레이아웃을 직접
     오버라이드하지 않고, 안정적인 클래스(.side-bar/.site-header/.site-nav)에
     프로필 카드를 삽입한다. 프로필 사진은 assets/images/profile.jpg 를
     교체하면 자동으로 바뀐다(정적 사이트의 '업로드'). -->
<style>
  /* 사이드바 하단 "This site uses Just the Docs..." 문구 숨김 */
  .site-footer { display: none !important; }

  .selly-profile {
    width: 100%;
    box-sizing: border-box;
    padding: 20px 22px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;   /* flex 부모 안에서도 확실히 가운데 */
    text-align: center;
    border-bottom: 1px solid #ECE3D8;
  }
  .selly-profile__avatar {
    width: 112px;
    height: 112px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid #F3C89B;
    background: #FBF3EA;
    margin: 0 auto 12px;
  }
  .selly-profile__avatar--fallback {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    font-weight: 700;
    color: #E8730C;
  }
  .selly-profile__name {
    font-size: 18px;
    font-weight: 700;
    color: #4A3B2A;
    line-height: 1.3;
  }
  .selly-profile__role {
    font-size: 13px;
    font-weight: 300;
    color: #9A8B78;
    margin-top: 3px;
  }
  .selly-profile__bio {
    font-size: 12.5px;
    font-weight: 300;
    color: #7C6C58;
    line-height: 1.55;
    margin-top: 10px;
    max-width: 220px;
  }
  .selly-profile__brand {
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px dashed #ECE3D8;
    width: 100%;
  }
  .selly-profile__brand img {
    height: 26px;
    width: auto;
    opacity: 0.92;
  }
  .selly-profile__brand-caption {
    font-size: 10px;
    color: #B7A895;
    margin-top: 4px;
    letter-spacing: 0.02em;
  }
</style>
<script>
  (function () {
    var AVATAR = "{{ '/assets/images/profile.jpg' | relative_url }}";
    var LOGO   = "{{ '/assets/images/foodcook-logo.png' | relative_url }}";

    // ── 여기만 고치면 프로필 문구가 바뀝니다 ─────────────────
    var NAME = "김지창";
    var ROLE = "식자재쿡 전략기획본부 CSO";
    var BIO  = "전략과 데이터로 외식업의 내일을 설계합니다.";  // ← 간단 소개문구
    // ────────────────────────────────────────────────────

    function esc(s) {
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function buildProfile() {
      var wrap = document.createElement('div');
      wrap.className = 'selly-profile';
      var bioHtml = BIO ? '<div class="selly-profile__bio">' + esc(BIO) + '</div>' : '';
      wrap.innerHTML =
        '<img class="selly-profile__avatar" src="' + AVATAR + '" alt="' + esc(NAME) + ' 프로필" ' +
        'onerror="this.onerror=null;this.outerHTML=\'<div class=&quot;selly-profile__avatar selly-profile__avatar--fallback&quot;>' + esc(NAME.charAt(0)) + '</div>\';">' +
        '<div class="selly-profile__name">' + esc(NAME) + '</div>' +
        '<div class="selly-profile__role">' + esc(ROLE) + '</div>' +
        bioHtml +
        '<div class="selly-profile__brand">' +
          '<img src="' + LOGO + '" alt="식자재쿡" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'none\';">' +
          '<div class="selly-profile__brand-caption">powered by 식자재쿡</div>' +
        '</div>';
      return wrap;
    }

    function inject() {
      var sidebar = document.querySelector('.side-bar');
      if (!sidebar) return false;
      if (document.querySelector('.selly-profile')) return true; // 중복 방지
      var nav = document.querySelector('#site-nav') || sidebar.querySelector('.site-nav');
      var profile = buildProfile();
      if (nav) {
        // 메뉴(nav) 컬럼 '안'의 맨 위에 삽입 → 메뉴와 동일한 폭·정렬 기준으로 가운데
        nav.insertBefore(profile, nav.firstChild);
      } else {
        var header = sidebar.querySelector('.site-header');
        if (header) {
          header.parentNode.insertBefore(profile, header.nextSibling); // 타이틀 바로 아래
        } else {
          sidebar.insertBefore(profile, sidebar.firstChild);
        }
      }
      return true;
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', inject);
    } else {
      inject();
    }
  })();
</script>
