      <circle cx="66" cy="112" r="12" fill="#F6A94F" opacity=".55"/>
      <circle cx="134" cy="112" r="12" fill="#F6A94F" opacity=".55"/>
      <circle cx="82" cy="96" r="6.5" fill="#3A2A1A"/>
