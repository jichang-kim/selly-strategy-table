      <ellipse cx="100" cy="208" rx="42" ry="10" fill="#6FA132"/>
      <circle cx="58" cy="180" r="14" fill="#8FBE4A"/>
      <circle cx="142" cy="180" r="14" fill="#8FBE4A"/>
