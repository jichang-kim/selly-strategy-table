<svg xmlns="http://www.w3.org/2000/svg" width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <!-- ============ 담이 (orange · 토끼탈) ============ -->
    <symbol id="mascot-dami" viewBox="0 0 200 230">
      <!-- body -->
      <path d="M60 210 Q60 158 100 158 Q140 158 140 210 Z" fill="#F79433"/>
      <ellipse cx="100" cy="208" rx="42" ry="10" fill="#E97B18"/>
      <!-- arms -->
      <circle cx="58" cy="180" r="14" fill="#F79433"/>
      <circle cx="142" cy="180" r="14" fill="#F79433"/>
      <!-- hood back -->
      <circle cx="100" cy="92" r="74" fill="#F79433"/>
      <!-- rabbit ears -->
      <ellipse cx="79" cy="30" rx="13" ry="32" fill="#F79433" transform="rotate(-12 79 30)"/>
      <ellipse cx="121" cy="30" rx="13" ry="32" fill="#F79433" transform="rotate(12 121 30)"/>
      <ellipse cx="79" cy="32" rx="6" ry="22" fill="#FBC7A0" transform="rotate(-12 79 32)"/>
      <ellipse cx="121" cy="32" rx="6" ry="22" fill="#FBC7A0" transform="rotate(12 121 32)"/>
      <!-- face opening (skin) -->
      <circle cx="100" cy="100" r="54" fill="#FFE3C4"/>
      <!-- cheeks -->
      <circle cx="66" cy="112" r="12" fill="#FBB27E" opacity=".7"/>
      <circle cx="134" cy="112" r="12" fill="#FBB27E" opacity=".7"/>
      <!-- eyes -->
      <circle cx="82" cy="96" r="6.5" fill="#3A2A1A"/>
      <circle cx="118" cy="96" r="6.5" fill="#3A2A1A"/>
      <circle cx="84" cy="93.5" r="2" fill="#fff"/>
      <circle cx="120" cy="93.5" r="2" fill="#fff"/>
      <!-- human smile (뿍이와 동일) -->
      <path d="M86 116 Q100 128 114 116" stroke="#C9701F" stroke-width="4" fill="none" stroke-linecap="round"/>
    </symbol>

    <!-- 담이 wink -->
    <symbol id="mascot-dami-wink" viewBox="0 0 200 230">
      <path d="M60 210 Q60 158 100 158 Q140 158 140 210 Z" fill="#F79433"/>
      <ellipse cx="100" cy="208" rx="42" ry="10" fill="#E97B18"/>
      <circle cx="58" cy="172" r="14" fill="#F79433"/>
      <circle cx="142" cy="180" r="14" fill="#F79433"/>
      <circle cx="100" cy="92" r="74" fill="#F79433"/>
      <ellipse cx="79" cy="30" rx="13" ry="32" fill="#F79433" transform="rotate(-12 79 30)"/>
      <ellipse cx="121" cy="30" rx="13" ry="32" fill="#F79433" transform="rotate(12 121 30)"/>
      <ellipse cx="79" cy="32" rx="6" ry="22" fill="#FBC7A0" transform="rotate(-12 79 32)"/>
      <ellipse cx="121" cy="32" rx="6" ry="22" fill="#FBC7A0" transform="rotate(12 121 32)"/>
      <circle cx="100" cy="100" r="54" fill="#FFE3C4"/>
