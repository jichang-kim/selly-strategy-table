      <circle cx="56" cy="168" r="14" fill="#8FBE4A"/>
      <circle cx="144" cy="168" r="14" fill="#8FBE4A"/>
      <circle cx="100" cy="92" r="74" fill="#8FBE4A"/>
      <path d="M100 30 Q99 14 100 4" stroke="#6FA132" stroke-width="5" fill="none" stroke-linecap="round"/>
      <path d="M100 20 C86 12 72 16 71 30 C87 35 97 28 100 20 Z" fill="#A6CE63"/>
      <path d="M100 14 C111 2 126 2 130 14 C117 22 105 21 100 14 Z" fill="#B7D97A"/>
      <circle cx="100" cy="100" r="54" fill="#FFE3C4"/>
      <circle cx="66" cy="110" r="12" fill="#F6A94F" opacity=".55"/>
      <circle cx="134" cy="110" r="12" fill="#F6A94F" opacity=".55"/>
      <path d="M76 92 Q82 86 88 92" stroke="#3A2A1A" stroke-width="4" fill="none" stroke-linecap="round"/>
      <path d="M112 92 Q118 86 124 92" stroke="#3A2A1A" stroke-width="4" fill="none" stroke-linecap="round"/>
      <path d="M84 114 Q100 134 116 114 Q100 122 84 114 Z" fill="#C9701F"/>
