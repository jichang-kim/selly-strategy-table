# ─────────────────────────────────────────────
# 셀리의 전략테이블 — Jekyll 설정
# GitHub Pages + just-the-docs 원격 테마
# ─────────────────────────────────────────────

title: 셀리의 전략테이블
description: 전략기획본부 CSO 관점의 리서치·분석·보고서를 축적하는 내부 전략 아카이브
lang: ko

# GitHub Pages 프로젝트 사이트 주소
url: "https://jichang-kim.github.io"
baseurl: "/selly-strategy-table"

# 원격 테마 (GitHub Pages 지원)
remote_theme: just-the-docs/just-the-docs
# 커스텀 연한 오렌지 컬러 스킴 (_sass/color_schemes/orange.scss)
color_scheme: orange

# ── 검색 ──────────────────────────────────────
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 3
  preview_words_after: 3
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

# ── 우측 상단 링크 ────────────────────────────
aux_links:
  "GitHub 저장소":
    - "https://github.com/jichang-kim/selly-strategy-table"
aux_links_new_tab: true

# ── 하단 ──────────────────────────────────────
footer_content: "© 2026 김지창 · 전략기획본부 · 셀리의 전략테이블"

# ── 마크다운 ──────────────────────────────────
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# ── Sass (로컬 빌드 로그 정리) ─────────────────────
sass:
  quiet_deps: true
  silence_deprecations:
    - import
    - global-builtin
    - color-functions

# ── 플러그인 (GitHub Pages 허용 목록) ─────────
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-include-cache

# ── 사이트 빌드 제외 ─────────────────────────
# templates/는 문서 양식(스캐폴딩)이므로 사이트에는 렌더링하지 않음
exclude:
  - CLAUDE.md
  - README.md
  - Gemfile
  - Gemfile.lock
  - scripts/
  - vendor/
  - templates/
  # mobile/ 는 React Native 앱(사이트 콘텐츠 아님) — Jekyll 빌드에서 제외
  - mobile/
  # 내부 설계 문서 — 본문 JSX의 {{ }} 가 Liquid 파싱과 충돌해 빌드를 막으므로 제외
  - react-native-design.md
